<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="SkillEctEd Support — Your dedicated helpdesk for student queries, technical assistance, and course support. Track and resolve your tickets efficiently." />
    <meta name="keywords" content="skillected support, skillected, student helpdesk, technical assistance, support ticket system, skillected education" />
    <meta name="author" content="SkillEctEd" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://support.skillected.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SkillEctEd Support | Official Helpdesk" />
    <meta property="og:description" content="Dedicated helpdesk for SkillEctEd students. Submit tickets, track status, and get expert assistance." />
    <meta property="og:image" content="https://support.skillected.com/logo-og.png" />
    <meta property="og:url" content="https://support.skillected.com/" />
    <meta property="og:site_name" content="SkillEctEd Support" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkillEctEd Support | Official Helpdesk" />
    <meta name="twitter:description" content="Submit tickets, track status, and get expert assistance from the SkillEctEd support team." />
    <meta name="twitter:image" content="https://support.skillected.com/logo-og.png" />

    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HelpDesk",
      "name": "SkillEctEd Support",
      "url": "https://support.skillected.com/",
      "logo": "https://support.skillected.com/logo.png",
      "description": "Premium ticket management and student support system for SkillEctEd.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@skillected.com",
        "contactType": "customer service"
      }
    }
    </script>

    <meta name="theme-color" content="#020617" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SkillEctEd Support" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>SkillEctEd Support | Helpdesk</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>
